name: Trigger auto deployment for ai-gateway-tco-dashboard

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ai-gateway-tco-dashboard-AutoDeployTrigger-2ed43870-77ad-48e2-a5c0-16ef5bc81efc.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AIGATEWAYTCODASHBOARD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AIGATEWAYTCODASHBOARD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AIGATEWAYTCODASHBOARD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/gateway
          dockerfilePath: Dockerfile
          registryUrl: cac8f95c8dd9acr.azurecr.io
          registryUsername: ${{ secrets.AIGATEWAYTCODASHBOARD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AIGATEWAYTCODASHBOARD_REGISTRY_PASSWORD }}
          containerAppName: ai-gateway-tco-dashboard
          resourceGroup: ai-gateway-rg
          imageToBuild: cac8f95c8dd9acr.azurecr.io/ai-gateway-tco-dashboard:${{ github.sha }}
          targetPort: 8000
          ingress: external


